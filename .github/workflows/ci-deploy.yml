name: CI & Deploy to Staging

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Start backend server
        run: node backend/dist/index.js &
        env:
          NODE_ENV: test
          TEST_MODE: 'true'
          SESSION_SECRET: ci-smoke-test-secret
          PORT: 3001
          DATA_DIR: /tmp/vibequeue-smoke

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && echo "Server ready" && break
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Run smoke tests
        run: npm run test:smoke --workspace=backend
        env:
          TEST_MODE: 'true'

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to staging
        run: flyctl deploy --remote-only --config fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}
